working_dir: .
secrets:
  - name: API_TOKEN
    provider: env
    key: SPEC006_API_TOKEN
steps:
  - name: write
    run: |
      printf 'PROCESS_ENV_BEFORE=%s\n' "$API_TOKEN" > secret-env-boundary.txt
      API_TOKEN=shell-local
      printf 'UNQUALIFIED_AFTER_ASSIGN=%s\n' "$API_TOKEN" >> secret-env-boundary.txt
      printf 'NAMESPACED_INSERTION=%s\n' '${env.API_TOKEN}' >> secret-env-boundary.txt
  - name: write_action
    action: file.write
    with:
      path: secret-action-boundary.txt
      content: |
        UNQUALIFIED_ACTION=$API_TOKEN
        NAMESPACED_ACTION=${env.API_TOKEN}
