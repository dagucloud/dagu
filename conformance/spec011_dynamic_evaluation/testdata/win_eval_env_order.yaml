shell: powershell
working_dir: .
params:
  - name: environment
    type: string
    default: prod
  - name: combined
    type: string
    eval: $(Write-Output '${SPEC011_DYNAMIC_VALUE}-${params.environment}')
steps:
  - name: write
    run: Set-Content -NoNewline -Path windows-env-order.txt -Value '${params.combined}'
