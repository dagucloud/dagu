params:
  - name: environment
    description: Runtime environment.
working_dir: .
handler_on:
  success:
    action: sqlite.query
    with:
      dsn: ":memory:"
      query: "SELECT :environment AS environment"
      output_format: jsonl
      params:
        environment: "${params.environment}"
    stdout: "handler-with-params.txt"
steps:
  - name: ok
    run: "true"
