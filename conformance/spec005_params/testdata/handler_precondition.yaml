params:
  - name: environment
    description: Runtime environment.
working_dir: .
handler_on:
  success:
    preconditions:
      - condition: |
          value='${params.environment}'
          if [ "$value" = prod ]; then
            exit 0
          fi
          if [ "$value" = '${params.environment}' ]; then
            printf '%s\n' literal > handler-precondition-literal.txt
            exit 0
          fi
          exit 1
    run: |
      printf '%s\n' prod > handler-precondition.txt
steps:
  - name: ok
    run: "true"
