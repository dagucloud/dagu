params:
  - name: environment
    description: Runtime environment.
working_dir: .
steps:
  - name: write
    preconditions:
      - condition: |
          value='${params.environment}'
          if [ "$value" = prod ]; then
            exit 0
          fi
          if [ "$value" = '${params.environment}' ]; then
            printf '%s\n' literal > step-precondition-literal.txt
            exit 0
          fi
          exit 1
    run: |
      printf '%s\n' prod > step-precondition.txt
