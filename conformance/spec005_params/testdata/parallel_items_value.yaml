params:
  - name: environment
    description: Runtime environment.
working_dir: .
steps:
  - name: fanout
    action: dag.run
    with:
      dag: child-parallel-items-value
      params:
        - environment: ${ITEM}
    parallel:
      items:
        - "${params.environment}"
    output: PARALLEL_RESULTS
  - name: consume
    depends: fanout
    run: |
      printf '%s\n' "$PARALLEL_RESULTS" > parallel-items-value.txt

---

name: child-parallel-items-value
params:
  - name: environment
    description: Runtime environment.
working_dir: .
steps:
  - name: write
    run: |
      printf '%s\n' '${params.environment}'
    output: CHILD_VALUE
