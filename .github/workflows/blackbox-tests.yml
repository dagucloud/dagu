name: Black-box Tests

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/blackbox-tests.yml"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "Makefile"
      - "specs/**"
      - "tests/**"
  pull_request:
    # Keep this workflow directly rerunnable from PR-only maintenance commits.
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - ".github/workflows/blackbox-tests.yml"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "Makefile"
      - "specs/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.3"

jobs:
  blackbox:
    name: Black-box tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Dagu binary
        run: make bin

      - name: Run black-box tests
        env:
          DAGU_BIN: ${{ github.workspace }}/.local/bin/dagu
        run: go test -count=1 ./tests
